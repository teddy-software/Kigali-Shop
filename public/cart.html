<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — KigaliStyle</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-logo">🌿 KigaliStyle <span>Shop</span></a>
    <button class="hamburger" id="hamburger">☰</button>
    <div class="navbar-links" id="navbar-links">
      <a href="/">Home</a>
      <a href="/products.html">Shop</a>
      <a href="/cart.html" class="cart-btn">🛒 Cart <span class="cart-count" id="cart-count" style="display:none">0</span></a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <h1>Shopping Cart</h1>
    <p>Review your items before checkout</p>
  </div>
</div>

<div id="cart-page">
  <div class="loading" style="padding:80px"><div class="spinner"></div>Loading your cart...</div>
</div>

<footer>
  <div class="footer-logo">🌿 KigaliStyle Shop</div>
  <p>Authentic Rwandan fashion © 2026</p>
</footer>

<script src="/js/main.js"></script>
<script>
  async function loadCart() {
    const r = await fetch(`/api/cart/${getSessionId()}`);
    const data = await r.json();
    const el = document.getElementById('cart-page');

    if (!data.items || !data.items.length) {
      el.innerHTML = `<div class="empty-cart">
        <div class="empty-cart-icon">🛒</div>
        <h2>Your cart is empty</h2>
        <p>Discover our beautiful Rwandan fashion collection!</p>
        <a href="/products.html" class="btn-filled" style="display:inline-block;padding:14px 32px;text-decoration:none;border-radius:var(--radius);font-weight:700;font-size:16px;background:var(--primary);color:#fff">Start Shopping →</a>
      </div>`;
      return;
    }

    const shipping = data.total >= 50000 ? 0 : 2000;
    const grand = data.total + shipping;

    el.innerHTML = `<div class="cart-layout">
      <div>
        <div class="cart-items">
          ${data.items.map(item => `
            <div class="cart-item">
              <img src="${item.image_url}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=400'">
              <div class="cart-item-info">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-price">${formatPrice(item.price)} each</div>
              </div>
              <div class="cart-qty-control">
                <button class="cart-qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
                <span class="cart-qty-num">${item.quantity}</span>
                <button class="cart-qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
              </div>
              <div class="cart-item-subtotal">${formatPrice(item.subtotal)}</div>
              <button class="cart-remove" onclick="removeItem(${item.id})">🗑</button>
            </div>`).join('')}
        </div>
        <div style="margin-top:16px"><a href="/products.html" style="color:var(--primary-light);font-size:14px;text-decoration:none;font-weight:600">← Continue Shopping</a></div>
      </div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span>${formatPrice(data.total)}</span></div>
        <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:var(--success)">FREE</span>' : formatPrice(shipping)}</span></div>
        <div class="summary-row summary-total"><span>Total</span><span>${formatPrice(grand)}</span></div>
        <a href="/checkout.html" class="btn-checkout">Proceed to Checkout →</a>
      </div>
    </div>`;
  }

  async function updateQty(id, qty) {
    await fetch(`/api/cart/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ quantity: qty }) });
    loadCart(); updateCartCount();
  }

  async function removeItem(id) {
    await fetch(`/api/cart/${id}`, { method: 'DELETE' });
    showToast('Item removed'); loadCart(); updateCartCount();
  }

  loadCart();
</script>
</body>
</html>
