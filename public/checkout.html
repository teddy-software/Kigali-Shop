<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — KigaliStyle</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-logo">🌿 KigaliStyle <span>Shop</span></a>
    <button class="hamburger" id="hamburger">☰</button>
    <div class="navbar-links" id="navbar-links">
      <a href="/">Home</a>
      <a href="/products.html">Shop</a>
      <a href="/cart.html" class="cart-btn">🛒 Cart <span class="cart-count" id="cart-count" style="display:none">0</span></a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <h1>Checkout</h1>
    <p>Fill in your details to complete the order</p>
  </div>
</div>

<div class="checkout-layout">
  <div class="checkout-form">
    <h2>Delivery Details</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="name" placeholder="e.g. Amina Uwimana" required>
      </div>
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" id="phone" placeholder="e.g. 0788 123 456" required>
      </div>
    </div>
    <div class="form-group">
      <label>Email Address *</label>
      <input type="email" id="email" placeholder="e.g. amina@email.com" required>
    </div>
    <div class="form-group">
      <label>Delivery Address *</label>
      <textarea id="address" rows="3" placeholder="Sector, District, City" required style="width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'Inter',sans-serif;resize:vertical"></textarea>
    </div>
    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;margin-bottom:24px;font-size:14px;color:#92400e">
      💰 Payment: Cash on Delivery
    </div>
    <button class="btn-place-order" id="place-order-btn" onclick="placeOrder()">✅ Place Order</button>
  </div>

  <div class="order-sidebar">
    <h3>Your Order</h3>
    <div id="order-items-preview"><div class="loading"><div class="spinner"></div></div></div>
    <div style="border-top:2px solid var(--border);margin-top:16px;padding-top:16px">
      <div class="summary-row"><span style="color:var(--text-light)">Subtotal</span><span id="sidebar-subtotal">—</span></div>
      <div class="summary-row"><span style="color:var(--text-light)">Shipping</span><span id="sidebar-shipping">—</span></div>
      <div class="summary-row summary-total"><span>Total</span><span id="sidebar-total">—</span></div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">🌿 KigaliStyle Shop</div>
  <p>Authentic Rwandan fashion © 2026</p>
</footer>

<script src="/js/main.js"></script>
<script>
  async function loadOrderPreview() {
    const r = await fetch(`/api/cart/${getSessionId()}`);
    const data = await r.json();
    if (!data.items || !data.items.length) { window.location = '/cart.html'; return; }
    document.getElementById('order-items-preview').innerHTML = data.items.map(i => `
      <div class="order-item-row">
        <img src="${i.image_url}" alt="${i.name}" onerror="this.src='https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=400'">
        <div><div class="order-item-name">${i.name}</div><div class="order-item-meta">Qty: ${i.quantity}</div></div>
        <div class="order-item-price">${formatPrice(i.subtotal)}</div>
      </div>`).join('');
    const shipping = data.total >= 50000 ? 0 : 2000;
    document.getElementById('sidebar-subtotal').textContent = formatPrice(data.total);
    document.getElementById('sidebar-shipping').innerHTML = shipping === 0 ? '<span style="color:var(--success)">FREE</span>' : formatPrice(shipping);
    document.getElementById('sidebar-total').textContent = formatPrice(data.total + shipping);
  }

  async function placeOrder() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    if (!name || !email || !phone || !address) { showToast('Please fill in all fields', 'error'); return; }
    const btn = document.getElementById('place-order-btn');
    btn.disabled = true; btn.innerHTML = '⏳ Placing order...';
    try {
      const r = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: getSessionId(), customer: { name, email, phone, address } })
      });
      const data = await r.json();
      if (data.success) { window.location = `/confirm.html?order=${data.orderId}&total=${data.total}`; }
      else { showToast(data.error || 'Order failed', 'error'); btn.disabled = false; btn.innerHTML = '✅ Place Order'; }
    } catch { showToast('Network error', 'error'); btn.disabled = false; btn.innerHTML = '✅ Place Order'; }
  }

  loadOrderPreview();
</script>
</body>
</html>
