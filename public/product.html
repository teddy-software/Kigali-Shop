<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — KigaliStyle</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-logo">🌿 KigaliStyle <span>Shop</span></a>
    <button class="hamburger" id="hamburger">☰</button>
    <div class="navbar-links" id="navbar-links">
      <a href="/">Home</a>
      <a href="/products.html">Shop</a>
      <a href="/cart.html" class="cart-btn">🛒 Cart <span class="cart-count" id="cart-count" style="display:none">0</span></a>
    </div>
  </div>
</nav>

<div id="product-page">
  <div class="loading" style="padding:80px"><div class="spinner"></div>Loading...</div>
</div>

<section class="section" id="related-section" style="display:none">
  <div class="section-header">
    <h2 class="section-title">You may also <span>like</span></h2>
  </div>
  <div class="products-grid" id="related-products"></div>
</section>

<footer>
  <div class="footer-logo">🌿 KigaliStyle Shop</div>
  <p>Authentic Rwandan fashion © 2026</p>
</footer>

<script src="/js/main.js"></script>
<script>
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) window.location = '/products.html';
  let qty = 1;

  fetch(`/api/products/${id}`).then(r => r.json()).then(p => {
    document.title = `${p.name} — KigaliStyle`;
    document.getElementById('product-page').innerHTML = `
      <div class="product-detail">
        <div class="product-detail-img">
          <img src="${p.image_url}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=400'">
        </div>
        <div class="product-detail-info">
          <div style="font-size:13px;color:var(--primary-light);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">${p.category}</div>
          <h1>${p.name}</h1>
          <div class="product-detail-price">${formatPrice(p.price)}</div>
          <p class="product-detail-desc">${p.description}</p>
          <div style="background:var(--bg);border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:14px;color:var(--text-light)">
            ✅ In Stock (${p.stock} available) &nbsp;|&nbsp; 🚚 Free delivery in Kigali
          </div>
          <div class="qty-row">
            <span style="font-weight:600;font-size:14px">Quantity:</span>
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-display" id="qty-display">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
          <button class="btn-big btn-primary-big" onclick="addToCart(${p.id}, qty)">🛒 Add to Cart</button>
          <a href="/cart.html" class="btn-big" style="display:block;text-align:center;padding:16px;border:2px solid var(--primary);color:var(--primary);border-radius:var(--radius);text-decoration:none;font-weight:700;margin-top:12px">View Cart</a>
        </div>
      </div>`;

    fetch(`/api/products?category=${encodeURIComponent(p.category)}`).then(r => r.json()).then(rel => {
      const others = rel.filter(r => r.id != id).slice(0, 4);
      if (others.length) {
        document.getElementById('related-section').style.display = 'block';
        document.getElementById('related-products').innerHTML = others.map(rp => `
          <div class="product-card" onclick="window.location='/product.html?id=${rp.id}'">
            <img src="${rp.image_url}" alt="${rp.name}" loading="lazy">
            <div class="product-card-body">
              <div class="product-category">${rp.category}</div>
              <div class="product-name">${rp.name}</div>
              <div class="product-price">${formatPrice(rp.price)}</div>
            </div>
            <div class="product-card-footer">
              <button class="btn-add-cart" onclick="event.stopPropagation(); addToCart(${rp.id})">+ Add to Cart</button>
            </div>
          </div>`).join('');
      }
    });
  });

  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById('qty-display').textContent = qty;
  }
</script>
</body>
</html>
